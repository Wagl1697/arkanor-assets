name: Generar imágenes B&N y Notificar

on:
  push:
    paths:
      - 'img/**' 

jobs:
  procesar_y_notificar:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Descargar código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # --- ESTE ES EL PASO CLAVE QUE FALTABA O NO SE ESTÁ LEYENDO ---
      - name: 🛠️ Instalar ImageMagick
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick
      # --------------------------------------------------------------

      - name: 🎨 Generar versiones en Blanco y Negro
        run: |
          # El script solo procesa estas 4 carpetas puntuales, ignorando el resto de img/
          CARPETAS=(
            "img/Clases/Talentos de Clases"
          )

          for carpeta in "${CARPETAS[@]}"; do
            if [ -d "$carpeta" ]; then
              carpeta_bn="${carpeta} Bn"
              mkdir -p "$carpeta_bn"
              
              find "$carpeta" -maxdepth 1 -type f \( -iname "*.png" -o -iname "*.jpg" -o -iname "*.jpeg" \) | while read img; do
                
                archivo=$(basename "$img")
                nombre="${archivo%.*}"
                ext="${archivo##*.}"
                img_bn="$carpeta_bn/${nombre}_bw.${ext}"
                
                if [ ! -f "$img_bn" ] || [ "$img" -nt "$img_bn" ]; then
                  echo "Convirtiendo: $img -> $img_bn"
                  convert "$img" -colorspace Gray "$img_bn"
                fi
              done
            fi
          done

      - name: 💾 Guardar cambios en GitHub (Commit & Push)
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          git add .
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-generar imágenes B&N [skip ci]" && git push)

      - name: 🔔 Disparar Webhook a Apps Script
        run: |
          echo "Llamando a la URL secreta de Apps Script..."
          curl -f -S -L -d "" "${{ secrets.APPSCRIPT_WEBHOOK_URL }}"
          echo -e "\n✅ Tarea completada y señal enviada"
