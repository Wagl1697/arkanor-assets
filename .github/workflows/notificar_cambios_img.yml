name: Procesar Imágenes (Acentos, B&N y Notificar)

# ==========================================
# CUÁNDO SE EJECUTA
# ==========================================
on:
  push:
    paths:
      - 'img/**' # Se dispara con cualquier cambio en la galería

# ==========================================
# PERMISOS PARA QUE EL BOT PUEDA GUARDAR
# ==========================================
permissions:
  contents: write

jobs:
  procesar_imagenes:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Descargar código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🛠️ Instalar ImageMagick
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick

      - name: 📝 Limpiar acentos en toda la carpeta img/
        run: |
          # Buscamos todos los archivos dentro de img/ y sus subcarpetas
          find img/ -type f | while read archivo; do
            directorio=$(dirname "$archivo")
            nombre_base=$(basename "$archivo")
            
            # Reemplazamos vocales con tilde, dejando la ñ y Ñ intactas (jaja)
            nuevo_nombre=$(echo "$nombre_base" | sed 's/á/a/g; s/é/e/g; s/í/i/g; s/ó/o/g; s/ú/u/g; s/Á/A/g; s/É/E/g; s/Í/I/g; s/Ó/O/g; s/Ú/U/g')
            
            # Si el nombre tenía acentos, lo renombramos
            if [ "$nombre_base" != "$nuevo_nombre" ]; then
              mv "$archivo" "$directorio/$nuevo_nombre"
              echo "Limpiado: '$nombre_base' -> '$nuevo_nombre'"
            fi
          done

      - name: 🎨 Generar versiones en Blanco y Negro
        run: |
          # Lista exacta de las carpetas a escanear (agregué la de Talentos que sumaste antes)
          CARPETAS=(
            "img/Clases/Habilidades de Clases"
            "img/Clases/Iconos de Clases"
            "img/Clases/Talentos de Clases"
            "img/Razas/Habilidades Raciales"
            "img/Razas/Iconos de Razas"
            "img/Conocimientos"
            "img/Estadisticas"
          )

          for carpeta in "${CARPETAS[@]}"; do
            if [ -d "$carpeta" ]; then
              carpeta_bn="${carpeta} Bn"
              mkdir -p "$carpeta_bn"
              
              find "$carpeta" -maxdepth 1 -type f \( -iname "*.png" -o -iname "*.jpg" -o -iname "*.jpeg" \) | while read img; do
                
                archivo=$(basename "$img")
                nombre="${archivo%.*}"
                ext="${archivo##*.}"
                img_bn="$carpeta_bn/${nombre}_bw.${ext}"
                
                if [ ! -f "$img_bn" ] || [ "$img" -nt "$img_bn" ]; then
                  echo "Convirtiendo: $img -> $img_bn"
                  convert "$img" -colorspace Gray "$img_bn"
                fi
              done
            fi
          done

      - name: 💾 Guardar cambios en GitHub (Commit & Push)
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          git add .
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-limpiar acentos y generar B&N [skip ci]" && git push)

      - name: 🔔 Disparar Webhook a Apps Script
        run: |
          echo "Llamando a la URL secreta de Apps Script..."
          curl -f -S -L -d "" "${{ secrets.APPSCRIPT_WEBHOOK_URL }}"
          echo -e "\n✅ Todas las tareas completadas y señal enviada a Apps Script"
