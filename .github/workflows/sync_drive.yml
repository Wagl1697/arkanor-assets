name: Sincronizar Google Drive a GitHub

on:
  workflow_dispatch: # Esto crea un botón para que lo ejecutes a mano cuando quieras subir imágenes nuevas

permissions:
  contents: write
  id-token: write # Permiso CLAVE para que funcione la conexión segura que armamos en Google Cloud

jobs:
  sincronizar:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Bajar el código del repo
        uses: actions/checkout@v4

      - name: 🔐 Autenticar con Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: 🐍 Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 Instalar librerías de Google
        run: pip install google-api-python-client google-auth

      - name: 🚀 Ejecutar script de descarga
        run: python sync_drive.py
        env:
          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}

      - name: 💾 Guardar y subir cambios a GitHub
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add img/
          git commit -m "🖼️ Actualización automática de imágenes desde Drive" || echo "No hay imágenes nuevas para subir"
          git push
