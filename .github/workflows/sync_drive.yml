name: Sincronizar Google Drive a GitHub

on:
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  # ==========================================
  # TAREA 1: Sincronizar y Subir
  # ==========================================
  sincronizar_drive:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Bajar el código del repo
        uses: actions/checkout@v4

      - name: 🔐 Autenticar con Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: 🐍 Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 Instalar librerías de Google
        run: pip install google-api-python-client google-auth

      - name: 🚀 Ejecutar script de descarga
        run: python sync_drive.py
        env:
          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}

      - name: 💾 Guardar y subir cambios a GitHub
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global core.quotepath off 
          
          git add img/
          
          if git diff --staged --quiet; then
            echo "No hay imágenes nuevas ni modificadas para subir. Terminando sin commit."
          else
            DETALLE=$(git diff --name-status --staged)
            git commit -m "🖼️ Actualización automática de imágenes" -m "Detalle de los cambios:" -m "$DETALLE"
            git push
            echo "✅ Commit realizado con el detalle de los cambios."
          fi

  # ==========================================
  # TAREA 2: Avisar a Google Apps Script
  # ==========================================
  notificar_appscript:
    needs: sincronizar_drive # <--- ESTO HACE QUE ESPERE A LA TAREA 1
    runs-on: ubuntu-latest
    steps:
      - name: 🔔 Disparar Webhook
        run: |
          echo "Llamando a la URL secreta de Apps Script..."
          # El flag -f hace que si devuelve un 404 (Page Not Found), marque error en GitHub
          curl -f -S -L -X POST "${{ secrets.APPSCRIPT_WEBHOOK_URL }}"
          echo -e "\n✅ Señal enviada con éxito a Google Apps Script"
